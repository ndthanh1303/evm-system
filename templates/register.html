<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Register - EVM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>

<div class="container">

    <!-- LEFT -->
    <div class="left-panel">
        <div class="logo">
            <img src="{{ url_for('static', filename='images/logo_fit.png') }}" alt="Logo">
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right-panel">

        <!-- Tabs -->
        <div class="tabs">
            <a href="{{ url_for('login') }}">Đăng nhập</a>
            <button class="active">Đăng ký</button>
        </div>

        <form method="POST" action="{{ url_for('register') }}">

            <input type="text" name="fullname" placeholder="Họ và tên" value="{{ fullname or '' }}">
            <input type="tel" name="phone" placeholder="Số điện thoại" value="{{ phone or '' }}">
            <input type="email" name="email" placeholder="Email" value="{{ email or '' }}">

            <input type="text" name="username" placeholder="Username" value="{{ username or '' }}">
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="repassword" placeholder="Nhập lại Password" required>

            <button type="submit" class="btn-login">ĐĂNG KÝ</button>

            <p class="error">{{ msg }}</p>

        </form>

    </div>

</div>

</body>
</html>
